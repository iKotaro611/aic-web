<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>私のWebページ</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #202124;
        background: #f7f8fa;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(720px, calc(100% - 40px));
        padding: 48px 0;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 8vw, 4rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        max-width: 560px;
        color: #555f6d;
        font-size: 1.125rem;
        line-height: 1.7;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>こんにちは</h1>
      <p>GitHub Pagesで公開するためのシンプルなWebサイトです。</p>
    </main>
  </body>
</html>
